<head>
  <meta charset="UTF-8">
  <title>Amazon Page</title>
  <style>
    body {
      margin: 0;
      font-family:monospace;
      background-color: #f3f3f3;
      cursor: grab;
    }
    body:hover :active{
        cursor: grabbing;
    }


    .header {
      background-color: #131921;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    .search-bar {
      flex: 1;
      margin: 0 20px;
    }
    .search-bar input {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
    }
    .nav-links a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

 
    .banner {
      background-color: #febd69;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product img {
      max-width: 100%;
      height: auto;
    }
    .product h3 {
      font-size: 16px;
      margin: 10px 0;
    }
    .product p {
      color: #007185;
      font-weight: bold;
    }

    .footer {
      background-color: #131921;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
    }
    img{
        height: 70px;
        width: 70px;
    }
  </style>
